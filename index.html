<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Taylor Swift Bot 🎤</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{height:100dvh;background:#0a0612;font-family:'Assistant',sans-serif;direction:rtl;display:flex;flex-direction:column;}
#bg-layer{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center top;transition:background-image 0.5s;}
#bg-dim{position:fixed;inset:0;z-index:1;background:rgba(4,1,12,0.60);}
#sparkle-field{position:fixed;inset:0;pointer-events:none;z-index:2;}
.sparkle{position:absolute;border-radius:50%;background:#C9A96E;animation:twinkle 3s ease-in-out infinite;}
#login-screen{position:fixed;inset:0;z-index:999;background:linear-gradient(145deg,#0a0612,#1a0a2e);display:flex;align-items:center;justify-content:center;padding:28px;}
#login-screen.hidden{display:none;}
.ls-box{width:100%;max-width:360px;text-align:center;}
.ls-logo{font-size:54px;margin-bottom:14px;}
.ls-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,#C9A96E,#F5E6C8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
.ls-sub{font-size:13px;color:rgba(240,232,216,0.5);margin-bottom:28px;line-height:1.65;}
#login-btn{width:100%;padding:15px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#C9A96E,#8B6914);color:#0a0612;font-family:'Assistant',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;}
#login-btn:active{transform:scale(0.97);}
.ls-note{font-size:11px;color:rgba(201,169,110,0.4);}
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:50;}
#drawer-overlay.open{display:block;}
#drawer{position:fixed;top:0;right:-290px;bottom:0;width:290px;z-index:60;background:linear-gradient(160deg,#0f0620,#0a1428);border-left:1px solid rgba(201,169,110,0.2);display:flex;flex-direction:column;transition:right 0.28s cubic-bezier(0.4,0,0.2,1);}
#drawer.open{right:0;}
#drawer-header{padding:20px 16px 14px;border-bottom:1px solid rgba(201,169,110,0.12);display:flex;align-items:center;justify-content:space-between;}
#drawer-title{font-family:'Playfair Display',serif;font-size:13px;letter-spacing:0.15em;color:rgba(201,169,110,0.6);}
#drawer-close{background:none;border:none;cursor:pointer;color:rgba(201,169,110,0.5);font-size:20px;}
#rooms-list{flex:1;overflow-y:auto;padding:8px 10px;}
#rooms-list::-webkit-scrollbar{display:none;}
.room-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all 0.15s;}
.room-item.active{background:rgba(201,169,110,0.13);border-color:rgba(201,169,110,0.22);}
.room-pf{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(201,169,110,0.4);flex-shrink:0;}
.room-name{font-size:14px;color:rgba(240,232,216,0.7);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.room-item.active .room-name{color:#f0e8d8;font-weight:600;}
.room-del{opacity:0;background:none;border:none;color:rgba(255,100,100,0.5);cursor:pointer;font-size:13px;padding:2px 7px;flex-shrink:0;}
.room-item:hover .room-del{opacity:1;}
#drawer-footer{padding:12px;border-top:1px solid rgba(201,169,110,0.1);display:flex;flex-direction:column;gap:7px;}
.side-btn{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(201,169,110,0.18);background:none;cursor:pointer;font-family:'Assistant',sans-serif;font-size:13px;color:rgba(201,169,110,0.7);display:flex;align-items:center;gap:8px;}
.side-btn.danger{border-color:rgba(255,100,100,0.18);color:rgba(255,120,120,0.6);}
#header{display:flex;align-items:center;gap:11px;padding:12px 16px;background:rgba(6,2,14,0.9);border-bottom:1px solid rgba(201,169,110,0.18);flex-shrink:0;position:relative;z-index:10;}
#menu-btn{background:none;border:none;cursor:pointer;width:36px;height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;}
#menu-btn span{display:block;width:20px;height:2px;background:rgba(201,169,110,0.7);border-radius:2px;}
#avatar-wrap{position:relative;flex-shrink:0;}
#avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid #C9A96E;}
#online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#4ade80;border:2px solid #0a0612;}
#header-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;background:linear-gradient(135deg,#C9A96E,#F5E6C8,#8B6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#room-label{font-size:11px;color:rgba(201,169,110,0.5);margin-top:1px;}
#saved-badge{font-size:11px;color:rgba(100,200,100,0.6);opacity:0;transition:opacity 0.4s;flex-shrink:0;}
#messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:10;-webkit-overflow-scrolling:touch;}
#messages::-webkit-scrollbar{display:none;}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeIn 0.25s ease;}
.msg-row.user{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(201,169,110,0.35);flex-shrink:0;}
.bubble-wrap{max-width:78%;display:flex;flex-direction:column;gap:4px;}
.msg-row.user .bubble-wrap{align-items:flex-end;}
.taylor-bubble{background:rgba(14,4,28,0.9);border:1px solid rgba(201,169,110,0.25);border-radius:18px 18px 18px 4px;padding:11px 14px;backdrop-filter:blur(10px);}
.user-bubble{background:rgba(12,24,55,0.9);border:1px solid rgba(100,150,255,0.25);border-radius:18px 18px 4px 18px;padding:11px 14px;backdrop-filter:blur(10px);}
.msg-text{font-size:15px;line-height:1.72;color:#f0e8d8;white-space:pre-wrap;word-break:break-word;}
.copy-btn{align-self:flex-start;background:rgba(0,0,0,0.3);border:1px solid rgba(201,169,110,0.18);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;color:rgba(201,169,110,0.5);font-family:'Assistant',sans-serif;}
.msg-row.user .copy-btn{align-self:flex-end;}
.copy-btn.copied{color:#4ade80!important;border-color:rgba(74,222,128,0.4)!important;}
.typing-dots{display:flex;gap:5px;padding:4px 0;}
.dot{width:7px;height:7px;border-radius:50%;background:#C9A96E;display:inline-block;animation:bounce 1.4s ease-in-out infinite both;}
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
#input-bar{flex-shrink:0;padding:10px 12px 12px;border-top:1px solid rgba(201,169,110,0.15);background:rgba(6,2,14,0.95);position:relative;z-index:10;}
#input-wrap{display:flex;gap:8px;align-items:flex-end;}
#user-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(201,169,110,0.26);border-radius:20px;padding:10px 16px;color:#f0e8d8;font-size:16px;line-height:1.45;resize:none;outline:none;font-family:'Assistant',sans-serif;direction:rtl;max-height:110px;overflow-y:auto;}
#user-input:focus{border-color:rgba(201,169,110,0.55);}
#user-input::placeholder{color:rgba(240,232,216,0.28);}
#send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#C9A96E,#8B6914);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(201,169,110,0.35);}
#send-btn:disabled{opacity:0.35;cursor:default;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex;}
#modal{background:linear-gradient(145deg,#1a0a2e,#0d1a3a);border:1px solid rgba(201,169,110,0.28);border-radius:18px;padding:24px 20px;width:100%;max-width:340px;}
#modal h3{font-family:'Playfair Display',serif;color:#C9A96E;margin-bottom:14px;font-size:18px;}
#modal-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(201,169,110,0.26);border-radius:12px;padding:11px 14px;color:#f0e8d8;font-size:16px;font-family:'Assistant',sans-serif;direction:rtl;outline:none;margin-bottom:16px;}
.modal-btns{display:flex;gap:10px;}
.modal-btn{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-family:'Assistant',sans-serif;font-size:15px;}
.modal-btn.ok{background:linear-gradient(135deg,#C9A96E,#8B6914);color:#0a0612;font-weight:700;}
.modal-btn.cancel{background:rgba(255,255,255,0.06);color:rgba(240,232,216,0.6);border:1px solid rgba(255,255,255,0.1);}
#copy-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:300;align-items:center;justify-content:center;padding:20px;}
#copy-modal-overlay.open{display:flex;}
#copy-modal{background:linear-gradient(145deg,#1a0a2e,#0d1a3a);border:1px solid rgba(201,169,110,0.28);border-radius:18px;padding:20px;width:100%;max-width:340px;}
#copy-modal-title{font-family:'Playfair Display',serif;color:#C9A96E;margin-bottom:12px;font-size:16px;}
#copy-textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(201,169,110,0.3);border-radius:10px;padding:10px 12px;color:#f0e8d8;font-size:14px;font-family:'Assistant',sans-serif;direction:rtl;resize:none;outline:none;min-height:100px;max-height:200px;overflow-y:auto;}
#copy-close{margin-top:12px;width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#C9A96E,#8B6914);color:#0a0612;font-weight:700;cursor:pointer;font-family:'Assistant',sans-serif;font-size:14px;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5);}50%{opacity:1;transform:scale(1);}}
@keyframes bounce{0%,80%,100%{transform:scale(0);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-dim"></div>
<div id="sparkle-field"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="ls-box">
    <div class="ls-logo">&#127925;</div>
    <div class="ls-title">Taylor Swift Bot</div>
    <div class="ls-sub">כדי להשתמש בבוט, התחבר עם חשבון Puter.<br/>חינם לגמרי — בלי כרטיס אשראי.</div>
    <button id="login-btn">&#128274; התחבר עם Puter (חינם)</button>
    <div class="ls-note">אין חשבון? ייצור אחד בחינם ב-puter.com</div>
  </div>
</div>

<!-- DRAWER -->
<div id="drawer-overlay"></div>
<div id="drawer">
  <div id="drawer-header">
    <span id="drawer-title">&#128172; חדרי שיחה</span>
    <button id="drawer-close">&#10005;</button>
  </div>
  <div id="rooms-list"></div>
  <div id="drawer-footer">
    <button class="side-btn" id="new-room-btn">&#10133; חדר חדש</button>
    <button class="side-btn" id="export-btn">&#128190; ייצא צ׳אט</button>
    <button class="side-btn danger" id="clear-btn">&#128465; נקה חדר זה</button>
  </div>
</div>

<!-- HEADER -->
<div id="header">
  <button id="menu-btn"><span></span><span></span><span></span></button>
  <div id="avatar-wrap">
    <img id="avatar" src="" alt="T"/>
    <div id="online-dot"></div>
  </div>
  <div style="flex:1;min-width:0;">
    <div id="header-name">Taylor Swift</div>
    <div id="room-label"></div>
  </div>
  <span id="saved-badge">&#10003; שמור</span>
</div>

<div id="messages"></div>

<div id="input-bar">
  <div id="input-wrap">
    <textarea id="user-input" rows="1" placeholder="כתוב הודעה... &#127925;"></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- NEW ROOM MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3>שם לחדר החדש</h3>
    <input id="modal-input" type="text" placeholder="למשל: שירים, ויכוח..."/>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="modal-cancel">ביטול</button>
      <button class="modal-btn ok" id="modal-ok">צור חדר</button>
    </div>
  </div>
</div>

<!-- COPY MODAL -->
<div id="copy-modal-overlay">
  <div id="copy-modal">
    <div id="copy-modal-title">&#128203; בחר הכל והעתק</div>
    <textarea id="copy-textarea" readonly></textarea>
    <button id="copy-close">סגור</button>
  </div>
</div>

const RKEY = 'ts_rooms_v1';
const HKEY = 'ts_hists_v1';
const AKEY = 'ts_active_v1';

var rooms=[{id:0,name:'ויכוח ראשי',icon:'🎤'},{id:1,name:'שירים',icon:'✍️'},{id:2,name:'ויכוח תורני',icon:'📖'},{id:3,name:'רעיונות',icon:'💡'}];
var hists={0:[],1:[],2:[],3:[]};
var activeId=0;
var busy=false;

function WELCOME(name){return 'היי! אני טיילור סוויפט 😄\n\nשמעתי שאתה רוצה להתווכח, לכתוב, לפרק שיר — כל מה שתביא. יש לי 14 גרמי, ידע תורני, ואוזן מפיקה.\n\nתתחיל. 🎤';}

// ── Storage ──────────────────────────────────
async function svRooms(){try{await puter.kv.set(RKEY,JSON.stringify(rooms));}catch(e){}}
async function svHists(){try{await puter.kv.set(HKEY,JSON.stringify(hists));flashSaved();}catch(e){}}
async function svActive(){try{await puter.kv.set(AKEY,String(activeId));}catch(e){}}
function flashSaved(){var b=document.getElementById('saved-badge');b.style.opacity='1';clearTimeout(b._t);b._t=setTimeout(function(){b.style.opacity='0';},1600);}

// ── Theme ─────────────────────────────────────
function setTheme(){
  var ri=rooms.findIndex(function(r){return r.id===activeId;});
  var bg=BG[ri%BG.length];var pf=PF[ri%PF.length];
  document.getElementById('bg-layer').style.backgroundImage='url('+bg+')';
  document.getElementById('avatar').src=pf;
  document.querySelectorAll('.msg-avatar').forEach(function(img){img.src=pf;});
}
function pfSrc(){var ri=rooms.findIndex(function(r){return r.id===activeId;});return PF[ri%PF.length];}

// ── Drawer ────────────────────────────────────
var drawer=document.getElementById('drawer');
var drawerOv=document.getElementById('drawer-overlay');
function openDrawer(){drawer.classList.add('open');drawerOv.classList.add('open');}
function closeDrawer(){drawer.classList.remove('open');drawerOv.classList.remove('open');}
document.getElementById('menu-btn').addEventListener('click',openDrawer);
document.getElementById('drawer-close').addEventListener('click',closeDrawer);
drawerOv.addEventListener('click',closeDrawer);

// ── Sidebar ───────────────────────────────────
function renderSidebar(){
  var list=document.getElementById('rooms-list');
  list.innerHTML='';
  rooms.forEach(function(rm,i){
    var item=document.createElement('div');
    item.className='room-item'+(rm.id===activeId?' active':'');
    item.innerHTML='<img class="room-pf" src="'+PF[i%PF.length]+'" alt=""/><span class="room-name">'+rm.name+'</span>'+(rooms.length>1?'<button class="room-del" data-id="'+rm.id+'">&#10005;</button>':'');
    item.addEventListener('click',function(e){
      if(e.target.classList.contains('room-del'))return;
      activeId=rm.id;svActive();renderSidebar();renderMessages();setTheme();closeDrawer();
    });
    var del=item.querySelector('.room-del');
    if(del)del.addEventListener('click',function(e){e.stopPropagation();delRoom(rm.id);});
    list.appendChild(item);
  });
  var ar=rooms.find(function(r){return r.id===activeId;});
  document.getElementById('room-label').textContent=ar?'# '+ar.name:'';
}

function delRoom(id){
  if(!confirm('למחוק את החדר?'))return;
  rooms=rooms.filter(function(r){return r.id!==id;});
  if(activeId===id)activeId=rooms[0].id;
  svRooms();svActive();renderSidebar();renderMessages();setTheme();
}

// ── Messages ──────────────────────────────────
var msgsEl=document.getElementById('messages');

function mkAv(){var img=document.createElement('img');img.className='msg-avatar';img.src=pfSrc();img.alt='T';return img;}

function mkCopyBtn(text){
  var btn=document.createElement('button');btn.className='copy-btn';btn.textContent='📋 העתק';
  btn.addEventListener('click',function(){
    var cm=document.getElementById('copy-modal-overlay');
    var ct=document.getElementById('copy-textarea');
    ct.value=text;cm.classList.add('open');
    setTimeout(function(){ct.focus();ct.select();},100);
  });
  return btn;
}

function addMsg(role,text){
  var row=document.createElement('div');row.className='msg-row '+(role==='user'?'user':'');
  if(role==='assistant')row.appendChild(mkAv());
  var wrap=document.createElement('div');wrap.className='bubble-wrap';
  var bubble=document.createElement('div');bubble.className=role==='user'?'user-bubble':'taylor-bubble';
  var p=document.createElement('p');p.className='msg-text';p.textContent=text;
  bubble.appendChild(p);wrap.appendChild(bubble);wrap.appendChild(mkCopyBtn(text));
  row.appendChild(wrap);msgsEl.appendChild(row);msgsEl.scrollTop=msgsEl.scrollHeight;
}

function renderMessages(){
  msgsEl.innerHTML='';
  var h=hists[activeId]||[];
  if(h.length===0){h=[{role:'assistant',content:WELCOME()}];hists[activeId]=h;}
  h.forEach(function(m){addMsg(m.role,m.content);});
  setTheme();
}

function showTyping(){
  var row=document.createElement('div');row.className='msg-row';row.id='trow';row.appendChild(mkAv());
  var wrap=document.createElement('div');wrap.className='bubble-wrap';
  var b=document.createElement('div');b.className='taylor-bubble';
  b.innerHTML='<div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  wrap.appendChild(b);row.appendChild(wrap);msgsEl.appendChild(row);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function removeTyping(){var t=document.getElementById('trow');if(t)t.remove();}

// ── Send (Puter AI) ───────────────────────────
var inp=document.getElementById('user-input');
var snd=document.getElementById('send-btn');

async function sendMessage(){
  var text=inp.value.trim();if(!text||busy)return;
  inp.value='';inp.style.height='auto';snd.disabled=true;
  var h=hists[activeId]||[];
  h.push({role:'user',content:text});
  addMsg('user',text);
  busy=true;showTyping();
  try{
    // Build conversation for puter
    var messages=[{role:'system',content:SP}];
    h.forEach(function(m){messages.push({role:m.role,content:m.content});});
    var response=await puter.ai.chat(messages,{model:'claude-sonnet-4-5'});
    // Extract text from any response format
    var reply='';
    try {
      if(typeof response==='string'){
        reply=response;
      } else {
        // Try all known paths
        var paths=[
          function(r){return r.text;},
          function(r){return r.message&&r.message.content&&typeof r.message.content==='string'?r.message.content:null;},
          function(r){return r.message&&r.message.content&&Array.isArray(r.message.content)?r.message.content.map(function(b){return b.text||'';}).join(''):null;},
          function(r){return r.choices&&r.choices[0]&&r.choices[0].message&&r.choices[0].message.content;},
          function(r){return r.content&&typeof r.content==='string'?r.content:null;},
        ];
        for(var pi=0;pi<paths.length;pi++){
          var v=paths[pi](response);
          if(v&&typeof v==='string'&&v.length>0){reply=v;break;}
        }
        if(!reply) reply='DEBUG: '+JSON.stringify(response).substring(0,200);
      }
    } catch(ex){ reply='שגיאה: '+ex.message; }
    h.push({role:'assistant',content:reply});
    removeTyping();addMsg('assistant',reply);
    svHists();
  }catch(e){
    removeTyping();
    var err='אופס... נסה שוב 😅 ('+e.message+')';
    h.push({role:'assistant',content:err});
    addMsg('assistant',err);
  }finally{busy=false;snd.disabled=!inp.value.trim();}
}

snd.addEventListener('click',sendMessage);
inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
inp.addEventListener('input',function(){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,110)+'px';snd.disabled=busy||!inp.value.trim();});

// ── New Room Modal ────────────────────────────
var ov=document.getElementById('modal-overlay');
var mi=document.getElementById('modal-input');
var ICONS=['🎵','🔥','✍️','🌙','⚡','🎸','💭','🖊️'];
document.getElementById('new-room-btn').addEventListener('click',function(){mi.value='';ov.classList.add('open');setTimeout(function(){mi.focus();},80);closeDrawer();});
document.getElementById('modal-cancel').addEventListener('click',function(){ov.classList.remove('open');});
ov.addEventListener('click',function(e){if(e.target===ov)ov.classList.remove('open');});
mi.addEventListener('keydown',function(e){if(e.key==='Enter')createRoom();});
document.getElementById('modal-ok').addEventListener('click',createRoom);
function createRoom(){
  var name=mi.value.trim()||'חדר חדש';
  var id=Date.now();
  var icon=ICONS[Math.floor(Math.random()*ICONS.length)];
  rooms.push({id:id,name:name,icon:icon});
  hists[id]=[];
  activeId=id;ov.classList.remove('open');
  svRooms();svHists();svActive();renderSidebar();renderMessages();setTheme();
}

// ── Export ────────────────────────────────────
document.getElementById('export-btn').addEventListener('click',function(){
  var h=hists[activeId]||[];
  var txt=h.map(function(m){return(m.role==='user'?'👤 אתה':'🎤 Taylor')+':\n'+m.content;}).join('\n\n---\n\n');
  var ar=rooms.find(function(r){return r.id===activeId;});
  var el=document.createElement('a');
  el.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  el.download='taylor-'+(ar?ar.name:'chat')+'.txt';el.click();closeDrawer();
});

// ── Clear ─────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click',function(){
  if(!confirm('למחוק את כל השיחה?'))return;
  hists[activeId]=[];svHists();renderMessages();closeDrawer();
});

// ── Copy Modal ────────────────────────────────
document.getElementById('copy-close').addEventListener('click',function(){document.getElementById('copy-modal-overlay').classList.remove('open');});
document.getElementById('copy-modal-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

// ── Login ─────────────────────────────────────
document.getElementById('login-btn').addEventListener('click',async function(){
  try{
    await puter.auth.signIn();
    initApp();
  }catch(e){alert('שגיאה בהתחברות: '+e.message);}
});

async function initApp(){
  document.getElementById('login-screen').classList.add('hidden');
  // Load saved data
  try{
    var sr=await puter.kv.get(RKEY);if(sr)rooms=JSON.parse(sr);
    var sh=await puter.kv.get(HKEY);if(sh)hists=JSON.parse(sh);
    var sa=await puter.kv.get(AKEY);if(sa)activeId=Number(sa);
  }catch(e){}
  renderSidebar();renderMessages();setTheme();
}

// Check if already logged in
(async function(){
  try{
    var loggedIn=await puter.auth.isSignedIn();
    if(loggedIn)initApp();
  }catch(e){}
})();
</script>
