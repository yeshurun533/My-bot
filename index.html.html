<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Taylor Swift Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{height:100dvh;background:#0a0612;font-family:'Assistant',sans-serif;direction:rtl;display:flex;flex-direction:column;}
#bg-layer{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center top;}
#bg-dim{position:fixed;inset:0;z-index:1;background:rgba(4,1,12,0.62);}
#sparkle-field{position:fixed;inset:0;pointer-events:none;z-index:2;}
.sparkle{position:absolute;border-radius:50%;background:#C9A96E;animation:twinkle 3s ease-in-out infinite;}

/* KEY SCREEN */
#key-screen{position:fixed;inset:0;z-index:999;background:linear-gradient(145deg,#0a0612,#1a0a2e);display:flex;align-items:center;justify-content:center;padding:28px;}
#key-screen.hidden{display:none;}
#key-box{width:100%;max-width:360px;text-align:center;}
.key-logo{font-size:54px;margin-bottom:14px;}
.key-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,#C9A96E,#F5E6C8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.key-sub{font-size:13px;color:rgba(240,232,216,0.5);margin-bottom:28px;line-height:1.65;}
#key-input{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(201,169,110,0.35);border-radius:14px;padding:14px 16px;color:#f0e8d8;font-size:15px;font-family:'Assistant',sans-serif;direction:ltr;outline:none;margin-bottom:10px;text-align:left;transition:border-color 0.2s;}
#key-input:focus{border-color:rgba(201,169,110,0.65);}
#key-input::placeholder{color:rgba(240,232,216,0.3);}
#key-err{font-size:12px;color:rgba(255,120,120,0.85);margin-bottom:12px;min-height:18px;}
#key-btn{width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#C9A96E,#8B6914);color:#0a0612;font-family:'Assistant',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;}
#key-btn:active{transform:scale(0.97);}
.key-link{font-size:12px;color:rgba(201,169,110,0.45);}
.key-link a{color:rgba(201,169,110,0.65);text-decoration:none;}

/* DRAWER */
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:50;}
#drawer-overlay.open{display:block;}
#drawer{position:fixed;top:0;right:-290px;bottom:0;width:290px;z-index:60;background:linear-gradient(160deg,#0f0620,#0a1428);border-left:1px solid rgba(201,169,110,0.2);display:flex;flex-direction:column;transition:right 0.28s cubic-bezier(0.4,0,0.2,1);}
#drawer.open{right:0;}
#drawer-header{padding:22px 18px 16px;border-bottom:1px solid rgba(201,169,110,0.12);display:flex;align-items:center;justify-content:space-between;}
#drawer-title{font-family:'Playfair Display',serif;font-size:14px;letter-spacing:0.15em;color:rgba(201,169,110,0.6);}
#drawer-close{background:none;border:none;cursor:pointer;color:rgba(201,169,110,0.5);font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;}
#rooms-list{flex:1;overflow-y:auto;padding:8px 10px;}
#rooms-list::-webkit-scrollbar{display:none;}
.room-item{display:flex;align-items:center;gap:10px;padding:11px;border-radius:10px;cursor:pointer;transition:all 0.15s;margin-bottom:3px;border:1px solid transparent;}
.room-item:hover,.room-item:active{background:rgba(201,169,110,0.07);}
.room-item.active{background:rgba(201,169,110,0.13);border-color:rgba(201,169,110,0.22);}
.room-pf{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,169,110,0.4);flex-shrink:0;}
.room-name{font-size:14px;color:rgba(240,232,216,0.7);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.room-item.active .room-name{color:#f0e8d8;font-weight:600;}
.room-del{opacity:0;background:none;border:none;color:rgba(255,100,100,0.5);cursor:pointer;font-size:14px;padding:3px 7px;border-radius:5px;flex-shrink:0;}
.room-item:hover .room-del{opacity:1;}
#drawer-footer{padding:14px 12px;border-top:1px solid rgba(201,169,110,0.1);display:flex;flex-direction:column;gap:8px;}
.side-btn{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(201,169,110,0.18);background:none;cursor:pointer;font-family:'Assistant',sans-serif;font-size:13px;color:rgba(201,169,110,0.7);display:flex;align-items:center;gap:9px;transition:all 0.15s;}
.side-btn:active{background:rgba(201,169,110,0.09);color:#C9A96E;}
.side-btn.danger{border-color:rgba(255,100,100,0.18);color:rgba(255,120,120,0.6);}
.side-btn.danger:active{background:rgba(255,100,100,0.08);color:rgba(255,120,120,0.95);}

/* HEADER */
#header{display:flex;align-items:center;gap:11px;padding:12px 16px;background:rgba(6,2,14,0.88);border-bottom:1px solid rgba(201,169,110,0.18);flex-shrink:0;position:relative;z-index:10;}
#menu-btn{background:none;border:none;cursor:pointer;width:38px;height:38px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;}
#menu-btn span{display:block;width:20px;height:2px;background:rgba(201,169,110,0.7);border-radius:2px;}
#avatar-wrap{position:relative;flex-shrink:0;}
#avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid #C9A96E;animation:pulse-glow 3s ease-in-out infinite;}
#online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#4ade80;border:2px solid #0a0612;}
#header-info{flex:1;min-width:0;}
#header-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;background:linear-gradient(135deg,#C9A96E,#F5E6C8,#8B6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#room-label{font-size:11px;color:rgba(201,169,110,0.5);margin-top:1px;}
#saved-badge{font-size:11px;color:rgba(100,200,100,0.6);opacity:0;transition:opacity 0.4s;flex-shrink:0;}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 12px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:10;-webkit-overflow-scrolling:touch;}
#messages::-webkit-scrollbar{display:none;}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeIn 0.25s ease;}
.msg-row.user{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(201,169,110,0.4);flex-shrink:0;}
.bubble-wrap{max-width:78%;display:flex;flex-direction:column;gap:4px;}
.msg-row.user .bubble-wrap{align-items:flex-end;}
.taylor-bubble{background:rgba(14,4,28,0.88);border:1px solid rgba(201,169,110,0.25);border-radius:18px 18px 18px 4px;padding:11px 14px;backdrop-filter:blur(10px);box-shadow:0 2px 20px rgba(0,0,0,0.5);}
.user-bubble{background:rgba(12,24,55,0.88);border:1px solid rgba(100,150,255,0.25);border-radius:18px 18px 4px 18px;padding:11px 14px;backdrop-filter:blur(10px);box-shadow:0 2px 20px rgba(0,0,0,0.5);}
.msg-text{font-size:15px;line-height:1.72;color:#f0e8d8;white-space:pre-wrap;word-break:break-word;}
.copy-btn{align-self:flex-start;background:rgba(0,0,0,0.35);border:1px solid rgba(201,169,110,0.18);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;color:rgba(201,169,110,0.5);font-family:'Assistant',sans-serif;transition:all 0.15s;}
.msg-row.user .copy-btn{align-self:flex-end;border-color:rgba(100,150,255,0.18);color:rgba(150,180,255,0.5);}
.copy-btn:active{background:rgba(201,169,110,0.12);border-color:rgba(201,169,110,0.45);color:#C9A96E;}
.copy-btn.copied{color:#4ade80!important;border-color:rgba(74,222,128,0.4)!important;}
.typing-dots{display:flex;gap:5px;padding:4px 2px;}
.dot{width:7px;height:7px;border-radius:50%;background:#C9A96E;display:inline-block;animation:bounce 1.4s ease-in-out infinite both;}
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}

/* INPUT */
#input-bar{flex-shrink:0;padding:10px 12px 12px;border-top:1px solid rgba(201,169,110,0.15);background:rgba(6,2,14,0.94);position:relative;z-index:10;}
#input-wrap{display:flex;gap:8px;align-items:flex-end;}
#user-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(201,169,110,0.26);border-radius:20px;padding:10px 16px;color:#f0e8d8;font-size:16px;line-height:1.45;resize:none;outline:none;font-family:'Assistant',sans-serif;direction:rtl;max-height:110px;overflow-y:auto;transition:border-color 0.2s;}
#user-input:focus{border-color:rgba(201,169,110,0.55);}
#user-input::placeholder{color:rgba(240,232,216,0.28);}
#send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#C9A96E,#8B6914);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(201,169,110,0.35);}
#send-btn:active{transform:scale(0.93);}
#send-btn:disabled{opacity:0.35;cursor:default;}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex;}
#modal{background:linear-gradient(145deg,#1a0a2e,#0d1a3a);border:1px solid rgba(201,169,110,0.28);border-radius:18px;padding:24px 20px;width:100%;max-width:340px;}
#modal h3{font-family:'Playfair Display',serif;color:#C9A96E;margin-bottom:14px;font-size:18px;}
#modal-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(201,169,110,0.26);border-radius:12px;padding:11px 14px;color:#f0e8d8;font-size:16px;font-family:'Assistant',sans-serif;direction:rtl;outline:none;margin-bottom:16px;}
#modal-input:focus{border-color:rgba(201,169,110,0.6);}
.modal-btns{display:flex;gap:10px;}
.modal-btn{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-family:'Assistant',sans-serif;font-size:15px;}
.modal-btn.ok{background:linear-gradient(135deg,#C9A96E,#8B6914);color:#0a0612;font-weight:700;}
.modal-btn.cancel{background:rgba(255,255,255,0.06);color:rgba(240,232,216,0.6);border:1px solid rgba(255,255,255,0.1);}

@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5);}50%{opacity:1;transform:scale(1);}}
@keyframes bounce{0%,80%,100%{transform:scale(0);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 6px #C9A96E;}50%{box-shadow:0 0 18px #C9A96E,0 0 34px #8B6914;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-dim"></div>
<div id="sparkle-field"></div>

<!-- KEY SCREEN -->
<div id="key-screen">
  <div id="key-box">
    <div class="key-logo">&#127925;</div>
    <div class="key-title">Taylor Swift Bot</div>
    <div class="key-sub">הכנס את מפתח ה-API שלך מ-Google Gemini.<br/>נשמר רק על המכשיר שלך.</div>
    <input id="key-input" type="password" placeholder="AIzaSy..." autocomplete="off"/>
    <div id="key-err"></div>
    <button id="key-btn">התחל לשוחח עם טיילור &#10024;</button>
    <div class="key-link">קבל מפתח חינם: <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a></div>
  </div>
</div>

<!-- DRAWER -->
<div id="drawer-overlay"></div>
<div id="drawer">
  <div id="drawer-header">
    <span id="drawer-title">&#128172; חדרי שיחה</span>
    <button id="drawer-close">&#10005;</button>
  </div>
  <div id="rooms-list"></div>
  <div id="drawer-footer">
    <button class="side-btn" id="new-room-btn">&#10133; חדר חדש</button>
    <button class="side-btn" id="export-btn">&#128190; ייצא צ&#39;אט</button>
    <button class="side-btn danger" id="clear-btn">&#128465; נקה חדר זה</button>
    <button class="side-btn" id="change-key-btn">&#128273; שנה API Key</button>
  </div>
</div>

<!-- HEADER -->
<div id="header">
  <button id="menu-btn"><span></span><span></span><span></span></button>
  <div id="avatar-wrap">
    <img id="avatar" src="" alt="T"/>
    <div id="online-dot"></div>
  </div>
  <div id="header-info">
    <div id="header-name">Taylor Swift</div>
    <div id="room-label"></div>
  </div>
  <span id="saved-badge">&#10003; שמור</span>
</div>

<div id="messages"></div>

<div id="input-bar">
  <div id="input-wrap">
    <textarea id="user-input" rows="1" placeholder="כתוב הודעה... &#127925;"></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24" width="19" height="19" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3>שם לחדר החדש</h3>
    <input id="modal-input" type="text" placeholder="למשל: שירים, ויכוח..."/>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="modal-cancel">ביטול</button>
      <button class="modal-btn ok" id="modal-ok">צור חדר</button>
    </div>
  </div>
</div>

const ROOMS_KEY = 'ts_v7';
const KEY_STORE = 'ts_apikey';

// ── Helpers ──────────────────────────────────────
var MEM={};
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return MEM[k]||null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){MEM[k]=v;}}
function getKey(){return lsGet(KEY_STORE)||'';}
function saveKey(k){lsSet(KEY_STORE,k);}
function loadRooms(){try{var r=lsGet(ROOMS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function saveRooms(){try{lsSet(ROOMS_KEY,JSON.stringify(rooms));flash();}catch(e){}}
function flash(){ const b=document.getElementById('saved-badge'); b.style.opacity='1'; clearTimeout(b._t); b._t=setTimeout(()=>b.style.opacity='0',1600); }
function defaultRooms(){ return {activeId:'r0',list:[{id:'r0',name:'ויכוח ראשי',history:[]},{id:'r1',name:'שירים',history:[]},{id:'r2',name:'ויכוח תורני',history:[]},{id:'r3',name:'רעיונות',history:[]}]}; }

let rooms = loadRooms() || defaultRooms();
function active(){ return rooms.list.find(r=>r.id===rooms.activeId)||rooms.list[0]; }
function roomIdx(id){ return Math.max(0,rooms.list.findIndex(r=>r.id===id)); }

    const val = document.getElementById('key-input').value.trim();
    if(val.length < 10){
      alert('המפתח קצר מדי. ודא שהעתקת את כל המפתח.');
      return;
    }
    saveKey(val);
    document.getElementById('key-screen').style.display='none';
    try { renderSidebar(); } catch(e){ alert('renderSidebar error: '+e.message); return; }
    try { renderMessages(); } catch(e){ alert('renderMessages error: '+e.message); return; }
    try { setTheme(); } catch(e){ alert('setTheme error: '+e.message); return; }
  } catch(e) {
    alert('שגיאה: ' + e.message);
  }
});

document.getElementById('key-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('key-btn').click();
});

document.getElementById('change-key-btn').addEventListener('click', function(){
  document.getElementById('key-input').value='';
  showKeyScreen();
  closeDrawer();
});

// ── Drawer ────────────────────────────────────────
const drawer=document.getElementById('drawer');
const drawerOv=document.getElementById('drawer-overlay');
function openDrawer(){ drawer.classList.add('open'); drawerOv.classList.add('open'); }
function closeDrawer(){ drawer.classList.remove('open'); drawerOv.classList.remove('open'); }
document.getElementById('menu-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
drawerOv.addEventListener('click', closeDrawer);

// ── Sidebar ───────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById('rooms-list');
  list.innerHTML='';
  rooms.list.forEach(function(room,i){
    const item=document.createElement('div');
    item.className='room-item'+(room.id===rooms.activeId?' active':'');
    item.innerHTML='<img class="room-pf" src="'+PF[i%PF.length]+'" alt=""/><span class="room-name">'+room.name+'</span>'+(rooms.list.length>1?'<button class="room-del" data-id="'+room.id+'">&#10005;</button>':'');
    item.addEventListener('click', function(e){
      if(e.target.classList.contains('room-del')) return;
      rooms.activeId=room.id; saveRooms(); renderSidebar(); renderMessages(); setTheme(); closeDrawer();
    });
    const del=item.querySelector('.room-del');
    if(del) del.addEventListener('click', function(e){ e.stopPropagation(); delRoom(room.id); });
    list.appendChild(item);
  });
  const a=active();
  document.getElementById('room-label').textContent=a?'# '+a.name:'';
}

function delRoom(id){
  if(!confirm('למחוק את החדר?')) return;
  rooms.list=rooms.list.filter(r=>r.id!==id);
  if(rooms.activeId===id) rooms.activeId=rooms.list[0].id;
  saveRooms(); renderSidebar(); renderMessages(); setTheme();
}

// ── Messages ──────────────────────────────────────
const msgsEl=document.getElementById('messages');

function mkAv(){
  const img=document.createElement('img'); img.className='msg-avatar'; img.alt='T'; img.src=pfSrc(); return img;
}
function mkCopy(text){
  const btn=document.createElement('button'); btn.className='copy-btn'; btn.textContent='📋 העתק';
  btn.addEventListener('click', function(){
    const done=function(){ btn.textContent='✓ הועתק!'; btn.classList.add('copied'); setTimeout(function(){ btn.textContent='📋 העתק'; btn.classList.remove('copied'); },2000); };
    if(navigator.clipboard) navigator.clipboard.writeText(text).then(done).catch(function(){ lcopy(text); done(); });
    else { lcopy(text); done(); }
  });
  return btn;
}
function lcopy(t){
  const a=document.createElement('textarea'); a.value=t; a.style.cssText='position:fixed;opacity:0;';
  document.body.appendChild(a); a.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(a);
}
function addMsg(role,text){
  const row=document.createElement('div'); row.className='msg-row '+(role==='user'?'user':'');
  if(role==='assistant') row.appendChild(mkAv());
  const wrap=document.createElement('div'); wrap.className='bubble-wrap';
  const bbl=document.createElement('div'); bbl.className=role==='user'?'user-bubble':'taylor-bubble';
  const p=document.createElement('p'); p.className='msg-text'; p.textContent=text;
  bbl.appendChild(p); wrap.appendChild(bbl); wrap.appendChild(mkCopy(text));
  row.appendChild(wrap); msgsEl.appendChild(row); msgsEl.scrollTop=msgsEl.scrollHeight;
}
function renderMessages(){
  msgsEl.innerHTML='';
  const a=active(); if(!a) return;
  if(a.history.length===0){ const w=mkWelcome(); a.history.push({role:'assistant',content:w}); saveRooms(); }
  a.history.forEach(function(m){ addMsg(m.role,m.content); });
  setTheme();
}
function showTyping(){
  const row=document.createElement('div'); row.className='msg-row'; row.id='trow'; row.appendChild(mkAv());
  const w=document.createElement('div'); w.className='bubble-wrap';
  const b=document.createElement('div'); b.className='taylor-bubble';
  b.innerHTML='<div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  w.appendChild(b); row.appendChild(w); msgsEl.appendChild(row); msgsEl.scrollTop=msgsEl.scrollHeight;
}
function removeTyping(){ const t=document.getElementById('trow'); if(t) t.remove(); }

// ── Send ──────────────────────────────────────────
let busy=false;
const inp=document.getElementById('user-input');
const snd=document.getElementById('send-btn');

async function send(){
  const text=inp.value.trim(); if(!text||busy) return;
  inp.value=''; inp.style.height='auto'; snd.disabled=true;
  const a=active(); a.history.push({role:'user',content:text}); addMsg('user',text); saveRooms();
  busy=true; showTyping();
  try{
    const geminiMsgs=a.history.map(function(m){ return {role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}; });
    const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+getKey(),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system_instruction:{parts:[{text:SYSTEM_PROMPT}]},contents:geminiMsgs,generationConfig:{maxOutputTokens:1000}})
    });
    const d=await res.json();
    const reply=(d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0])?d.candidates[0].content.parts[0].text:'';
    if(!reply) throw new Error('empty');
    a.history.push({role:'assistant',content:reply}); removeTyping(); addMsg('assistant',reply); saveRooms();
  }catch(e){
    removeTyping();
    const err='אופס... בדוק את המפתח שלך או את החיבור לאינטרנט 😅';
    a.history.push({role:'assistant',content:err}); addMsg('assistant',err); saveRooms();
  }finally{
    busy=false; snd.disabled=!inp.value.trim();
  }
}

function mkWelcome(){ return 'היי! אני טיילור סוויפט 😄\n\nשמעתי שאתה רוצה להתווכח, לכתוב, לפרק שיר — כל מה שתביא. יש לי 14 גרמי, ידע תורני, ואוזן מפיקה שתשמע כל מה שלא עובד בטקסט שלך.\n\nתתחיל. 🎤'; }

// ── Modal ─────────────────────────────────────────
const ov=document.getElementById('modal-overlay');
const mi=document.getElementById('modal-input');
document.getElementById('new-room-btn').addEventListener('click', function(){ mi.value=''; ov.classList.add('open'); setTimeout(function(){ mi.focus(); },80); closeDrawer(); });
document.getElementById('modal-cancel').addEventListener('click', function(){ ov.classList.remove('open'); });
ov.addEventListener('click', function(e){ if(e.target===ov) ov.classList.remove('open'); });
mi.addEventListener('keydown', function(e){ if(e.key==='Enter') mkRoom(); });
document.getElementById('modal-ok').addEventListener('click', mkRoom);
function mkRoom(){
  const name=mi.value.trim()||'חדר חדש'; const id='r'+Date.now();
  rooms.list.push({id:id,name:name,history:[]}); rooms.activeId=id;
  ov.classList.remove('open'); saveRooms(); renderSidebar(); renderMessages(); setTheme();
}

// ── Export ────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', function(){
  const a=active();
  const txt=a.history.map(function(m){ return (m.role==='user'?'👤 אתה':'🎤 Taylor')+':\n'+m.content; }).join('\n\n---\n\n');
  const el=document.createElement('a'); el.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  el.download='taylor-'+a.name+'.txt'; el.click(); closeDrawer();
});

// ── Clear ─────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', function(){
  if(!confirm('למחוק את כל השיחה?')) return;
  active().history=[]; saveRooms(); renderMessages(); closeDrawer();
});

// ── Input ─────────────────────────────────────────
snd.addEventListener('click', send);
inp.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
inp.addEventListener('input', function(){ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,110)+'px'; snd.disabled=busy||!inp.value.trim(); });

// ── Init ──────────────────────────────────────────
function init(){
  renderSidebar();
  renderMessages();
  setTheme();
}

if(getKey()){
  hideKeyScreen();
  init();
} else {
  showKeyScreen();
}
</script>
</body>
</html>
